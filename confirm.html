<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打样确认 - 印刷厂打样与客户确认系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <div class="confirm-page">
    <div class="confirm-header">
      <div class="confirm-header-content">
        <div class="confirm-logo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <path d="M9 15h6"/>
            <path d="M9 18h3"/>
          </svg>
          印刷打样确认系统
        </div>
      </div>
    </div>

    <div class="confirm-container">
      <div id="confirm-content">
        <div class="loading-spinner"></div>
        <p style="text-align: center; color: var(--color-text-muted); margin-top: 16px;">加载中...</p>
      </div>

      <div class="confirm-card" style="display: none;">
        <div class="confirm-card-header">
          <h1 class="confirm-title">打样确认</h1>
          <div id="confirm-status"></div>
        </div>

        <div class="confirm-info">
          <div class="confirm-info-grid">
            <div class="confirm-info-item">
              <span class="confirm-info-label">客户名称</span>
              <span class="confirm-info-value" id="confirm-customer"></span>
            </div>
            <div class="confirm-info-item">
              <span class="confirm-info-label">文件名称</span>
              <span class="confirm-info-value" id="confirm-filename"></span>
            </div>
            <div class="confirm-info-item">
              <span class="confirm-info-label">打印数量</span>
              <span class="confirm-info-value" id="confirm-quantity"></span>
            </div>
            <div class="confirm-info-item">
              <span class="confirm-info-label">当前版本</span>
              <span class="confirm-info-value" id="confirm-version"></span>
            </div>
            <div class="confirm-info-item">
              <span class="confirm-info-label">纸张类型</span>
              <span class="confirm-info-value" id="confirm-paper"></span>
            </div>
            <div class="confirm-info-item">
              <span class="confirm-info-label">装订方式</span>
              <span class="confirm-info-value" id="confirm-binding"></span>
            </div>
          </div>
        </div>

        <div class="confirm-section">
          <h2 class="confirm-section-title">打样问题标记</h2>
          <div id="confirm-issues" class="confirm-issues"></div>
        </div>

        <div class="confirm-section">
          <h2 class="confirm-section-title">打样照片</h2>
          <div id="confirm-photos" class="confirm-photos"></div>
        </div>

        <div id="confirm-actions" class="confirm-actions">
          <p class="confirm-hint">请仔细审核以上打样内容，选择确认结果：</p>
          <div class="confirm-buttons">
            <button id="btn-approve" class="btn btn-success btn-large">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              确认通过
            </button>
            <button id="btn-revise" class="btn btn-warning btn-large">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              需要修改
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="confirm-footer">
      <p>© 2024 印刷厂打样确认系统 · 请联系印刷厂获取技术支持</p>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/task-manager.js"></script>
  <script src="js/file-handler.js"></script>
  <script src="js/statistics.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
