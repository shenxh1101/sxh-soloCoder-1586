<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打样任务详情 - 印刷厂打样与客户确认系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="#/" class="navbar-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <path d="M9 15h6"/>
          <path d="M9 18h3"/>
        </svg>
        印刷打样管理系统
      </a>
      <div class="navbar-menu">
        <a href="#/" class="navbar-link active">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span>任务列表</span>
        </a>
        <a href="#/dashboard" class="navbar-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span>数据统计</span>
        </a>
        <a href="#/new" class="navbar-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>新建打样</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="main-container">
    <div class="content-container">
      <div class="detail-header">
        <div class="detail-header-left">
          <a href="#/" class="btn-back">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            返回列表
          </a>
          <h1 class="detail-title" id="detail-filename">加载中...</h1>
          <div class="detail-customer" id="detail-customer"></div>
        </div>
        <div class="detail-header-right">
          <div id="detail-status"></div>
          <div class="detail-actions">
            <button id="btn-start-proof" class="btn btn-primary" style="display: none;">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              开始打样
            </button>
            <button id="btn-submit-confirm" class="btn btn-success" style="display: none;">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v16"/><path d="M20 4v16"/><path d="M2 8h4"/><path d="M18 8h4"/><path d="M2 16h4"/><path d="M18 16h4"/></svg>
              提交客户确认
            </button>
            <button id="btn-new-version" class="btn btn-warning" style="display: none;">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
              创建新版本
            </button>
            <button id="btn-delete-task" class="btn btn-danger">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              删除任务
            </button>
          </div>
        </div>
      </div>

      <div class="detail-layout">
        <div class="detail-main">
          <div class="card">
            <div class="card-header">
              <h2 class="card-title">文件预览</h2>
              <div class="preview-toolbar">
                <div class="issue-type-selector">
                  <span class="issue-type-label">选择问题类型：</span>
                  <button class="issue-type-btn" data-type="color">
                    <span class="issue-dot color"></span>
                    色差
                  </button>
                  <button class="issue-type-btn" data-type="cut">
                    <span class="issue-dot cut"></span>
                    裁切
                  </button>
                  <button class="issue-type-btn" data-type="binding">
                    <span class="issue-dot binding"></span>
                    装订
                  </button>
                </div>
                <div id="preview-controls" class="preview-controls">
                  <button id="btn-zoom-out" class="icon-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                  </button>
                  <span id="zoom-level">100%</span>
                  <button id="btn-zoom-in" class="icon-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                  </button>
                  <div class="divider"></div>
                  <button id="btn-prev" class="icon-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                  </button>
                  <span id="page-info">1 / 1</span>
                  <button id="btn-next" class="icon-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                  </button>
                </div>
              </div>
            </div>
            <div id="preview-content" class="preview-content"></div>
          </div>

          <div class="card">
            <div class="card-header">
              <h2 class="card-title">打样问题标记</h2>
            </div>
            <div id="issues-list" class="issues-list"></div>
          </div>

          <div class="card">
            <div class="card-header">
              <h2 class="card-title">打样照片</h2>
            </div>
            <div id="photo-upload-area" class="photo-upload-area">
              <input type="file" id="photo-input" accept="image/*" multiple hidden>
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              <p>点击或拖拽上传打样照片</p>
            </div>
            <div id="photos-grid" class="photos-grid"></div>
          </div>
        </div>

        <div class="detail-sidebar">
          <div class="card">
            <div class="card-header">
              <h2 class="card-title">任务信息</h2>
            </div>
            <div class="info-list">
              <div class="info-item">
                <span class="info-label">当前版本</span>
                <span class="info-value" id="detail-version">v1</span>
              </div>
              <div class="info-item">
                <span class="info-label">打印数量</span>
                <span class="info-value" id="detail-quantity"></span>
              </div>
              <div class="info-item">
                <span class="info-label">纸张类型</span>
                <span class="info-value" id="detail-paper"></span>
              </div>
              <div class="info-item">
                <span class="info-label">装订方式</span>
                <span class="info-value" id="detail-binding"></span>
              </div>
              <div class="info-item">
                <span class="info-label">优先级</span>
                <span class="info-value" id="detail-priority"></span>
              </div>
              <div class="info-item">
                <span class="info-label">创建时间</span>
                <span class="info-value" id="detail-created"></span>
              </div>
              <div class="info-item">
                <span class="info-label">更新时间</span>
                <span class="info-value" id="detail-updated"></span>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-header">
              <h2 class="card-title">优先级设置</h2>
            </div>
            <select id="priority-select" class="select-input">
              <option value="normal">普通</option>
              <option value="urgent">紧急</option>
            </select>
          </div>

          <div class="card">
            <div class="card-header">
              <h2 class="card-title">版本历史</h2>
            </div>
            <div id="version-timeline" class="version-timeline"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/task-manager.js"></script>
  <script src="js/file-handler.js"></script>
  <script src="js/statistics.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
