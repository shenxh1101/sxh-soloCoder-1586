<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据统计 - 印刷厂打样与客户确认系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="#/" class="navbar-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <path d="M9 15h6"/>
          <path d="M9 18h3"/>
        </svg>
        印刷打样管理系统
      </a>
      <div class="navbar-menu">
        <a href="#/" class="navbar-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span>任务列表</span>
        </a>
        <a href="#/dashboard" class="navbar-link active">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span>数据统计</span>
        </a>
        <a href="#/new" class="navbar-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>新建打样</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="main-container">
    <div class="content-container">
      <div class="page-header">
        <h1 class="page-title">数据统计</h1>
        <p class="page-subtitle">查看打样业务数据，分析运营情况</p>
      </div>

      <div class="stats-grid">
        <div class="stat-card stat-primary">
          <div class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <div class="stat-content">
            <div class="stat-label">本月打样总数</div>
            <div class="stat-value" id="stat-total">0</div>
          </div>
        </div>
        
        <div class="stat-card stat-success">
          <div class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="stat-content">
            <div class="stat-label">已通过</div>
            <div class="stat-value" id="stat-approved">0</div>
          </div>
        </div>
        
        <div class="stat-card stat-warning">
          <div class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          </div>
          <div class="stat-content">
            <div class="stat-label">通过率</div>
            <div class="stat-value" id="stat-passrate">0%</div>
          </div>
        </div>
        
        <div class="stat-card stat-info">
          <div class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
          </div>
          <div class="stat-content">
            <div class="stat-label">平均修改次数</div>
            <div class="stat-value" id="stat-revisions">0</div>
          </div>
        </div>
        
        <div class="stat-card stat-accent">
          <div class="stat-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <div class="stat-content">
            <div class="stat-label">待处理</div>
            <div class="stat-value" id="stat-pending">0</div>
          </div>
        </div>
      </div>

      <div class="charts-grid">
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">打样数量趋势</h2>
            <span class="card-subtitle">近6个月</span>
          </div>
          <div class="chart-container">
            <svg id="chart-total" class="chart-svg"></svg>
          </div>
        </div>
        
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">通过率趋势</h2>
            <span class="card-subtitle">近6个月</span>
          </div>
          <div class="chart-container">
            <svg id="chart-passrate" class="chart-svg"></svg>
          </div>
        </div>
        
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">纸张类型分布</h2>
          </div>
          <div class="chart-container pie-chart-container">
            <svg id="chart-paper" class="chart-svg pie-chart-svg"></svg>
          </div>
        </div>
        
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">客户排行</h2>
            <span class="card-subtitle">按打样数量</span>
          </div>
          <div class="table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>客户名称</th>
                  <th>打样数量</th>
                  <th>通过数量</th>
                  <th>通过率</th>
                </tr>
              </thead>
              <tbody id="customer-stats-body">
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/task-manager.js"></script>
  <script src="js/file-handler.js"></script>
  <script src="js/statistics.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
