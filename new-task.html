<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新建打样任务 - 印刷厂打样与客户确认系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="#/" class="navbar-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <path d="M9 15h6"/>
          <path d="M9 18h3"/>
        </svg>
        印刷打样管理系统
      </a>
      <div class="navbar-menu">
        <a href="#/" class="navbar-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span>任务列表</span>
        </a>
        <a href="#/dashboard" class="navbar-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span>数据统计</span>
        </a>
        <a href="#/new" class="navbar-btn active">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>新建打样</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="main-container">
    <div class="content-container">
      <div class="page-header">
        <h1 class="page-title">新建打样任务</h1>
        <p class="page-subtitle">上传设计文件，填写打样信息，创建打样任务</p>
      </div>

      <form id="new-task-form" class="form-card">
        <div class="form-section">
          <h2 class="form-section-title">文件上传</h2>
          <p class="form-section-desc">支持PDF和JPG格式，可批量上传多个文件，每个文件将独立生成打样任务</p>
          
          <div id="file-upload-area" class="upload-area">
            <input type="file" id="file-input" accept=".pdf,.jpg,.jpeg" multiple hidden>
            <div class="upload-area-content">
              <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              <p class="upload-text">点击或拖拽文件到此处上传</p>
              <p class="upload-hint">支持 PDF、JPG 格式，单文件最大 50MB</p>
            </div>
          </div>
          
          <div id="file-list" class="file-list"></div>
        </div>

        <div class="form-section">
          <h2 class="form-section-title">打样信息</h2>
          <p class="form-section-desc">以下信息将应用于所有上传的文件</p>
          
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label" for="customer-name">客户名称 <span class="required">*</span></label>
              <input type="text" id="customer-name" class="text-input" placeholder="请输入客户名称" required>
            </div>
            
            <div class="form-group">
              <label class="form-label" for="print-quantity">打印数量 <span class="required">*</span></label>
              <input type="number" id="print-quantity" class="text-input" placeholder="请输入打印数量" min="1" value="1000" required>
            </div>
            
            <div class="form-group">
              <label class="form-label" for="paper-type">纸张类型 <span class="required">*</span></label>
              <select id="paper-type" class="select-input" required>
                <option value="coated_157">铜版纸 157g</option>
                <option value="coated_200">铜版纸 200g</option>
                <option value="coated_250">铜版纸 250g</option>
                <option value="coated_300">铜版纸 300g</option>
                <option value="matte_157">哑粉纸 157g</option>
                <option value="matte_200">哑粉纸 200g</option>
                <option value="matte_250">哑粉纸 250g</option>
                <option value="specialty">特种纸</option>
                <option value="newsprint">新闻纸</option>
              </select>
            </div>
            
            <div class="form-group">
              <label class="form-label" for="binding-type">装订方式 <span class="required">*</span></label>
              <select id="binding-type" class="select-input" required>
                <option value="perfect">无线胶装</option>
                <option value="saddle">骑马钉</option>
                <option value="sewn">锁线装订</option>
                <option value="spiral">螺旋装订</option>
                <option value="case">硬壳精装</option>
                <option value="none">无需装订</option>
              </select>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">优先级 <span class="required">*</span></label>
            <div class="radio-group">
              <label class="radio-item">
                <input type="radio" name="priority" value="normal" checked>
                <span class="radio-circle"></span>
                <span class="radio-label">普通</span>
              </label>
              <label class="radio-item urgent">
                <input type="radio" name="priority" value="urgent">
                <span class="radio-circle"></span>
                <span class="radio-label">紧急</span>
                <span class="radio-badge">标红置顶</span>
              </label>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" id="btn-cancel" class="btn btn-ghost">取消</button>
          <button type="submit" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            创建打样任务
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/task-manager.js"></script>
  <script src="js/file-handler.js"></script>
  <script src="js/statistics.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
