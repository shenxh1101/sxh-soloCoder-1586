<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>印刷厂打样与客户确认系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="#/" class="navbar-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <path d="M9 15h6"/>
          <path d="M9 18h3"/>
        </svg>
        印刷打样管理系统
      </a>
      <div class="navbar-menu">
        <a href="#/" class="navbar-link active">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span>任务列表</span>
        </a>
        <a href="#/dashboard" class="navbar-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span>数据统计</span>
        </a>
        <a href="#/new" class="navbar-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>新建打样</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="main-container">
    <div class="content-container">
      <div class="page-header">
        <h1 class="page-title">打样任务列表</h1>
        <p class="page-subtitle">管理所有打样任务，查看状态，跟踪进度</p>
      </div>

      <div class="filter-section">
        <div class="filter-group">
          <label class="filter-label">状态：</label>
          <select id="filter-status" class="select-input">
            <option value="all">全部状态</option>
            <option value="pending">待打样</option>
            <option value="processing">打样中</option>
            <option value="waiting_confirm">待确认</option>
            <option value="approved">已通过</option>
            <option value="need_revise">需修改</option>
          </select>
        </div>
        <div class="filter-group">
          <label class="filter-label">优先级：</label>
          <select id="filter-priority" class="select-input">
            <option value="all">全部</option>
            <option value="urgent">紧急</option>
            <option value="normal">普通</option>
          </select>
        </div>
        <input type="text" id="search-input" class="text-input search-input" placeholder="搜索客户名称、文件名...">
      </div>

      <div id="tasks-grid" class="tasks-grid"></div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/task-manager.js"></script>
  <script src="js/file-handler.js"></script>
  <script src="js/statistics.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
